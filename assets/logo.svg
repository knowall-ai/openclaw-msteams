<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7B83EB;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#5B5FC7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22C55E;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Teams icon stylized -->
  <rect x="20" y="40" width="120" height="120" rx="20" fill="url(#grad)" opacity="0.15"/>
  <text x="80" y="120" font-family="Segoe UI, Arial, sans-serif" font-size="72" font-weight="bold" fill="url(#grad)" text-anchor="middle">T</text>
  <!-- Main title -->
  <text x="160" y="100" font-family="monospace" font-size="48" font-weight="bold" fill="#1E293B">
    <tspan>openclaw</tspan><tspan fill="#5B5FC7">-</tspan><tspan fill="#7B83EB">msteams</tspan>
  </text>
  <!-- Subtitle -->
  <text x="160" y="140" font-family="monospace" font-size="18" fill="#64748B">
    Teams messages as a real M365 user — not a bot
  </text>
  <!-- Decorative line -->
  <line x1="160" y1="155" x2="700" y2="155" stroke="url(#grad)" stroke-width="2" opacity="0.4"/>
</svg>
